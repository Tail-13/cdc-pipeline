services:
  postgres-db:
    image: postgres:17-alpine
    container_name: postgres-db
    restart: always
    network_mode: "host" 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "TEST"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
    # setup for replication to kafka
    command: >
      postgres 
      -c wal_level=logical 
      -c max_wal_senders=4 
      -c max_replication_slots=4
    environment:
      POSTGRES_USER: TEST
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: TEST
    # not needed in host network mode
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  kafka-connect:
    image: debezium/connect:2.7.3.Final
    container_name: kafka-connect
    network_mode: "host"
    restart: always
    environment:
      REST_ADVERTISED_HOST_NAME: '10.0.2.10'

      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      # kafka cluster ip, port to external access
      BOOTSTRAP_SERVERS: '10.0.2.11:9092,10.0.2.12:9092,10.0.2.13:9092'

      # group cluster
      GROUP_ID: 'cdc-cluster'

      # node cluster config
      CONFIG_STORAGE_TOPIC: my_connect_configs
      OFFSET_STORAGE_TOPIC: my_connect_offsets
      STATUS_STORAGE_TOPIC: my_connect_statuses

      CONFIG_STORAGE_REPLICATION_FACTOR: 3
      OFFSET_STORAGE_REPLICATION_FACTOR: 3
      STATUS_STORAGE_REPLICATION_FACTOR: 3

      CONNECT_PRODUCER_ACKS: "all"
      CONNECT_PRODUCER_MIN_INSYNC_REPLICAS: 2

      # timeout 2 minute to check for new connector configs
      CONFIG_STORAGE_RECALL_WINDOW_MS: "120000"

    healthcheck:
      # Pings the root REST API endpoint to ensure the workers are running
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    restart: always
    container_name: ksqldb-server
    network_mode: "host"
    depends_on:
      kafka-connect:
        condition: service_healthy
    environment:
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: my_ksqldb_cluster_v2

      # Kafka cluster IPs
      KSQL_BOOTSTRAP_SERVERS: '10.0.2.11:9092,10.0.2.12:9092,10.0.2.13:9092'

      # Read from start
      KSQL_KSQL_STREAMS_AUTO_OFFSET_RESET: "earliest"
      
      # FIX: Ensure this points to the actual reachability path of Kafka Connect
      KSQL_KSQL_CONNECT_URL: http://10.0.2.10:8083 

      # 1. KsqlDB Internal Config Topics
      KSQL_KSQL_INTERNAL_TOPIC_REPLICAS: 3

      # 2. Underlying Kafka Streams Internal Topics
      KSQL_STREAMS_REPLICATION_FACTOR: 3
      
      # 3. Processing Guarantees & Acks
      KSQL_STREAMS_PRODUCER_ACKS: "all"
      KSQL_STREAMS_PRODUCER_MIN_INSYNC_REPLICAS: 2
      KSQL_KSQL_INTERNAL_TOPIC_REPLICATION_FACTOR: 3
      KSQL_KSQL_OFFSETS_TOPIC_REPLICATION_FACTOR: 3

      # 4. Enable Standby Replicas for instant failover
      KSQL_STREAMS_NUM_STANDBY_REPLICAS: 1

      KSQL_KSQL_STREAMS_SESSION_TIMEOUT_MS: "10000"
      KSQL_KSQL_STREAMS_HEARTBEAT_INTERVAL_MS: "3000"

    healthcheck:
      # Uses the native kSQLdB health check REST resource
      test: ["CMD", "curl", "-f", "http://localhost:8088/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    driver: local