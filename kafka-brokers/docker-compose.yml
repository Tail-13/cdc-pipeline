services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-node
    network_mode: "host"
    restart: always
    environment:
      KAFKA_NODE_ID: ${NODE_ID}
      CLUSTER_ID: 'Lwd5AsdFS5Sw5_plMxPFhw'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      
      # Bind to 0.0.0.0 (all interfaces) on the host to guarantee successful binding
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      
      # Advertise the actual host IP so other brokers/clients can route to it
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://${NODE_IP}:9092'
      
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@10.0.2.11:9093,2@10.0.2.12:9093,3@10.0.2.13:9093'
      
      # --- Translation Rules (Correctly double-underscored for Environment variables) ---
      KAFKA_OFFSETS__TOPIC__REPLICATION__FACTOR: 3
      KAFKA_TRANSACTION__STATE__LOG__MIN__ISR: 2
      KAFKA_TRANSACTION__STATE__LOG__REPLICATION__FACTOR: 3
      KAFKA_DEFAULT__REPLICATION__FACTOR: 3
      KAFKA_MIN__INSYNC__REPLICAS: 2
      
      # using /tmp error access denied
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka-data:/var/lib/kafka/data

volumes:
  kafka-data: