name: Deploy Kafka and Postgres Services

on: 
  push:
    branches:
      - main

jobs:
  deploy-brokers:
    runs-on: self-hosted
    strategy:
      matrix:
        include:
          - host: "10.0.2.11"
            env_file: "node1.env"
          - host: "10.0.2.12"
            env_file: "node2.env"
          - host: "10.0.2.13"
            env_file: "node3.env"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Configuration to Broker
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "kafka-brokers/docker-compose.yml,kafka-brokers/${{ matrix.env_file }}"
          target: "~/kafka-app"
          strip_components: 1

      - name: Start Kafka Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ matrix.host }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/kafka-app
            mv ${{ matrix.env_file }} .env

            # add -v to delete volume
            docker compose down -v

            # delete existing container if it exists
            # docker rm -f kafka-node || true

            #clean up old data to avoid issues with Kafka cluster
            # sudo rm -rf /var/lib/kafka/data/*

            docker compose up -d

  deploy-database:
    runs-on: self-hosted
    needs: deploy-brokers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Configuration to Database Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "database-servers/docker-compose.yml"
          target: "~/db-kafka"
          strip_components: 1

      - name: Start Database Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/db-kafka
            docker compose down
            docker compose up -d

  seed-database:
    runs-on: self-hosted
    needs: deploy-database
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy SQL Seed File to Database Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "database-servers/pg-init.sql"
          target: "~/db-kafka"
          strip_components: 1

      - name: Seed Database
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/db-kafka

            # < use to use local file instead -f which use container file
            docker compose exec -T postgres-db psql -U TEST -d TEST < pg-init.sql
  
  setup-kafka-connect:
    runs-on: self-hosted
    needs: seed-database # Ensures database is ready first
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy Kafka Connect JSON to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "database-servers/kafka-connect-setup.json"
          target: "~/db-kafka"
          strip_components: 1

      - name: Register Kafka Connector via Curl
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/db-kafka

            # 1. Define variables
            CONNECTOR_NAME="pg-journals-connector"
            KAFKA_URL="http://localhost:8083/connectors"
            
            # 2. Check if the connector already exists (returns HTTP status code 200 if it does)
            STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$KAFKA_URL/$CONNECTOR_NAME")
            
            # 3. Conditional execution logic
            if [ "$STATUS_CODE" -eq 200 ]; then
              echo "Connector '$CONNECTOR_NAME' already exists. Updating configuration via PUT..."
              
              curl -s -X PUT \
                -H "Content-Type: application/json" \
                -d @kafka-connect-setup.json \
                "$KAFKA_URL/$CONNECTOR_NAME/config"
                
            else
              echo "Connector '$CONNECTOR_NAME' not found. Creating new connector via POST..."
              
              curl -s -X POST \
                -H "Content-Type: application/json" \
                -d @kafka-connect-setup.json \
                "$KAFKA_URL"
            fi
  
  setup-ksqldb:
    runs-on: self-hosted
    needs: setup-kafka-connect # Ensures Kafka Connect and data pipelines are up first
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy ksqlDB Queries to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "database-servers/ksql-init.sql" # Path to your SQL file in git
          target: "~/db-kafka"
          strip_components: 1

      - name: Execute Queries via ksqlDB REST API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: "10.0.2.10"
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/db-kafka
            echo "Sending SQL queries to ksqlDB REST API..."
            docker compose exec -T ksqldb-server ksql http://localhost:8088 < ksql-init.sql